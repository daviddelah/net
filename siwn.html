<!DOCTYPE html>
<html>
<head>
  <title>Trend2Token - Connect Farcaster</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 500px;
      margin: 100px auto;
      padding: 20px;
      text-align: center;
    }
    h1 { color: #333; }
    .result {
      margin-top: 30px;
      padding: 20px;
      background: #f0f0f0;
      border-radius: 8px;
      text-align: left;
      word-break: break-all;
    }
    .result h3 { margin-top: 0; color: #2e7d32; }
    code {
      background: #e0e0e0;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #neynar_signin { margin: 30px 0; }
  </style>
</head>
<body>
  <h1>Trend2Token</h1>
  <p>Click below to connect your Farcaster account:</p>

  <div id="neynar_signin"></div>

  <div id="result" class="result" style="display:none;">
    <h3>Success! Add this to your .env file:</h3>
    <p><strong>NEYNAR_SIGNER_UUID=</strong><code id="signer_uuid"></code></p>
    <p><strong>FID:</strong> <span id="fid"></span></p>
    <p><strong>Username:</strong> @<span id="username"></span></p>
  </div>

  <script src="https://neynarxyz.github.io/siwn/raw/1.2.0/index.js" async></script>
  <script>
    window.onSignInSuccess = function(data) {
      console.log("Sign in success:", data);
      document.getElementById('signer_uuid').textContent = data.signer_uuid;
      document.getElementById('fid').textContent = data.fid;
      document.getElementById('username').textContent = data.user?.username || 'unknown';
      document.getElementById('result').style.display = 'block';
    };
  </script>

  <div
    class="neynar_signin"
    data-client_id="6bb596ab-073c-46a3-8c75-c020ec092132"
    data-success-callback="onSignInSuccess"
    data-theme="light"
  ></div>
</body>
</html>
